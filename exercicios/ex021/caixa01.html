<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando Caixas</title>
    <style>
        h1{
            background-color: greenyellow;
            height: 40px;
            width: 320px;

            

            border: 10px solid darkblue;

            padding: 10px 10px 10px 10px;

            margin: 10px 10px 40px 10px;

            outline-width: 5px;
            outline-style: dashed;
            outline-color: aqua;
        }

        a{
            border-width: 2px;
            border-style: solid;
            border-color: orange;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Box-Level</h1>
    <p>Paragrafos tambem são box level mas os <a href="#"> links são um exemplo de In-line level</a></p>
</body>
</html>
